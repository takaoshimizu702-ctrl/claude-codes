        bonusArea.innerHTML = '<div class="bonus-badge bonus-daikichi">🎁 大吉の方には、本日<strong>小鉢かひとくち甘味</strong>をサービスいたします。<br>スタッフにお声がけください。</div>';
      } else if (result === '吉') {
        bonusArea.innerHTML = '<div class="bonus-badge bonus-daikichi" style="border-color:rgba(142,202,230,0.4);background:rgba(142,202,230,0.08);color:#8ecae6;">🎁 吉の方にも、本日<strong>小鉢かひとくち甘味</strong>をサービスいたします。<br>スタッフにお声がけください。</div>';
      } else {
        bonusArea.innerHTML = '<div class="bonus-badge bonus-kyo">☕ ドリンクを追加でご注文いただくと<br><strong>運気が逆転</strong>いたします！<br><span style="font-size:0.8rem;opacity:0.8;">スタッフにお声がけください。</span></div>';
      }
      const resultArea = document.getElementById('resultArea');
      resultArea.classList.remove('show'); void resultArea.offsetWidth;
      resultArea.classList.add('show');
      resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function resetAll() {
      yearSelect.value = '';
      if (selectedSobaBtn) selectedSobaBtn.classList.remove('selected');
      selectedSoba = ''; selectedSobaBtn = null;
      document.getElementById('fortuneBtn').disabled = true;
      document.getElementById('resultArea').classList.remove('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (-Math.random() * 15) + 's';
      p.style.opacity = 0.1 + Math.random() * 0.2;
      p.style.height = (10 + Math.random() * 20) + 'px';
      particlesEl.appendChild(p);
    }
  </script>
</body>
</html>
